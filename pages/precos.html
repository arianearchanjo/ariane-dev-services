<style>
/* ── PAGE LAYOUT ── */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: calc(54px + 2px + 40px) 20px 80px;
  position: relative; z-index: 1;
}

/* ── HERO ── */
.hero {
  text-align: center;
  margin-bottom: 48px;
  animation: up 0.5s var(--ease) both;
}

.hero-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--cyan); background: var(--cyan-bg);
  border: 1px solid var(--cyan-bd);
  padding: 5px 14px; border-radius: 50px; margin-bottom: 20px;
}

.hero h1 {
  font-family: var(--font-head);
  font-size: clamp(26px, 6vw, 44px);
  font-weight: 800; letter-spacing: -0.04em; line-height: 1.05;
  color: var(--text); margin-bottom: 12px;
}
.hero h1 .accent { color: var(--cyan); }

.hero p {
  font-size: 15px; font-weight: 500;
  color: var(--text-dim); line-height: 1.65;
  max-width: 500px; margin: 0 auto;
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: var(--font-mono); font-size: 8px;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-mute); margin-bottom: 14px;
  display: block;
}

/* ── INFRA BOX ── */
.infra-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px 28px; margin-bottom: 40px;
  animation: up 0.5s var(--ease) 0.08s both;
}

.infra-title {
  font-family: var(--font-head);
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.infra-title::before {
  content: ''; display: inline-block;
  width: 6px; height: 6px; background: var(--cyan);
  border-radius: 50%; box-shadow: 0 0 10px rgba(0,212,232,0.5);
}

.infra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }

.infra-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: var(--bg3); border-radius: 10px; font-size: 12px;
}
.infra-key { color: var(--text-dim); font-weight: 500; font-family: var(--font-head); }
.infra-val { font-weight: 700; color: var(--text); font-family: var(--font-mono); font-size: 11px; }
.infra-val.free { color: var(--green); }

/* ── PLANS ── */
.plans-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 40px;
  animation: up 0.5s var(--ease) 0.12s both;
}

.plan-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 24px; padding: 28px 24px;
  display: flex; flex-direction: column;
  transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
}
.plan-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.plan-card.featured {
  border-color: var(--cyan-bd);
  background: linear-gradient(160deg, rgba(0,212,232,0.04) 0%, var(--bg2) 60%);
}
.plan-card.featured:hover { box-shadow: 0 12px 40px rgba(0,212,232,0.12); }

.plan-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 50px; margin-bottom: 16px; width: fit-content;
}
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.badge-cyan  { background: var(--cyan-bg);  color: var(--cyan);  border: 1px solid var(--cyan-bd); }
.badge-gray  { background: rgba(255,255,255,0.04); color: var(--text-mute); border: 1px solid var(--border); }

.plan-name {
  font-family: var(--font-head);
  font-size: 18px; font-weight: 800; letter-spacing: -0.03em;
  color: var(--text); margin-bottom: 6px; line-height: 1.1;
}
.plan-tagline {
  font-size: 12px; font-weight: 500; color: var(--text-dim);
  line-height: 1.55; margin-bottom: 20px;
}
.plan-divider { height: 1px; background: var(--border); margin-bottom: 16px; }

.price-block { margin-bottom: 16px; }
.price-label { font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-mute); margin-bottom: 8px; }

.price-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.price-row:last-child { border-bottom: none; }
.price-key { color: var(--text-dim); font-family: var(--font-head); }
.price-val { font-weight: 700; font-family: var(--font-mono); font-size: 11px; }
.price-val.strike { text-decoration: line-through; color: var(--text-mute); font-weight: 400; }
.price-val.promo   { color: var(--green); }
.price-val.free    { color: var(--green); }
.price-val.neutral { color: var(--text); }

.plan-total {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; background: var(--bg3); border-radius: 12px; margin-bottom: 20px;
}
.total-label { font-size: 11px; font-weight: 600; color: var(--text-dim); font-family: var(--font-head); }
.total-val { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: var(--green); letter-spacing: -0.03em; }

.why-box { background: var(--bg3); border-radius: 14px; padding: 16px; }
.why-title { font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan); margin-bottom: 10px; }
.why-item { display: flex; gap: 9px; margin-bottom: 8px; font-size: 12px; line-height: 1.55; color: var(--text-dim); font-weight: 500; font-family: var(--font-head); }
.why-item:last-child { margin-bottom: 0; }
.why-dot { flex-shrink: 0; width: 5px; height: 5px; background: var(--cyan); border-radius: 50%; margin-top: 6px; opacity: 0.6; }

/* ── EXTRAS ── */
.extras-section { margin-bottom: 40px; animation: up 0.5s var(--ease) 0.18s both; }
.extras-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }

.extra-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
  transition: border-color 0.2s, background 0.2s;
}
.extra-card:hover { border-color: var(--violet-bd); background: var(--violet-bg); }

.extra-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.extra-name { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
.extra-price { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--violet); white-space: nowrap; margin-left: 12px; flex-shrink: 0; }
.extra-why { font-size: 11px; font-weight: 500; color: var(--text-mute); line-height: 1.5; font-family: var(--font-head); }

.extra-tag { font-family: var(--font-mono); font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cyan); background: var(--cyan-bg); border: 1px solid var(--cyan-bd); padding: 2px 8px; border-radius: 50px; display: inline-block; margin-bottom: 6px; }
.extra-what { font-size: 12px; font-weight: 500; color: var(--text-dim); line-height: 1.6; padding: 10px 12px; background: var(--bg3); border-radius: 10px; margin-top: 6px; font-family: var(--font-head); }

/* ── NOTES ── */
.notes-section {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px 28px; margin-bottom: 40px;
  animation: up 0.5s var(--ease) 0.22s both;
}
.notes-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.note-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 12px; font-weight: 500; color: var(--text-dim); line-height: 1.6; font-family: var(--font-head); }
.note-item:last-child { margin-bottom: 0; }
.note-num { flex-shrink: 0; font-family: var(--font-mono); font-size: 9px; color: var(--cyan); margin-top: 2px; font-weight: 500; }

/* ── CTA ── */
.cta-section { text-align: center; animation: up 0.5s var(--ease) 0.28s both; }
.cta-title { font-family: var(--font-head); font-size: 22px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); margin-bottom: 8px; }
.cta-sub { font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 24px; font-family: var(--font-head); }
.cta-buttons { display: flex; flex-direction: column; align-items: center; gap: 10px; }
@media (min-width: 480px) { .cta-buttons { flex-direction: row; justify-content: center; } }

.cta-btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 14px 24px; text-decoration: none;
  font-family: var(--font-head); font-weight: 700; font-size: 13px;
  border-radius: 14px; transition: transform 0.18s var(--ease), box-shadow 0.18s;
  gap: 8px; cursor: pointer; border: none; min-width: 200px;
}
.cta-btn-primary { background: var(--cyan); color: #08111a; }
.cta-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--cyan-glow); }
.cta-btn-ghost { background: var(--bg2); border: 1px solid var(--border-hi); color: var(--text-dim); }
.cta-btn-ghost:hover { transform: translateY(-2px); color: var(--text); }

/* ── FOOTER ── */
.footer {
  margin-top: 60px; padding-top: 28px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; text-align: center;
  animation: up 0.5s var(--ease) 0.32s both;
}
.footer-logo { font-family: var(--font-head); font-size: 13px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-mute); }
.footer-logo .ext { color: var(--cyan); }
.footer-note { font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-mute); opacity: 0.5; }

@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@media (max-width: 360px) { .plans-grid { grid-template-columns: 1fr; } }
</style>
</head>
